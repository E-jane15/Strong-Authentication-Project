<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
</head>
<body>

<h2>Email Verification</h2>

<form action="/verify-otp" method="post">

    <input
            type="email"
            name="email"
            placeholder="Email"
            required>

    <br><br>

    <input
            type="text"
            name="otp"
            placeholder="Enter OTP"
            required>

    <br><br>

    <button type="submit">
        Verify
    </button>

</form>

</body>
</html>
