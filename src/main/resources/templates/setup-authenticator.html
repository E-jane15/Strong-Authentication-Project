<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Setup Google Authenticator</title>
</head>
<body>

<h2>Google Authenticator Setup</h2>

<p>Scan this QR code with Google Authenticator.</p>

<div th:if="${qrCode != null}">
    <img th:src="@{'data:image/png;base64,' + ${qrCode}}" alt="QR Code"/>
</div>

<div th:if="${qrCode == null}">
    <h3>No QR Code Received!</h3>
</div>

<p>
    Username:
    <span th:text="${username}"></span>
</p>

</body>
</html>
