<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify Google Authenticator</title>
</head>
<body>

<h2>Google Authenticator Verification</h2>

<p>
    Welcome <b th:text="${username}"></b>
</p>

<form th:action="@{/verify-totp}" method="post">

    <label>Authenticator Code</label><br>

    <input type="text"
           name="code"
           maxlength="6"
           required>

    <br><br>

    <button type="submit">
        Verify
    </button>

</form>

<p style="color:red;" th:text="${message}"></p>

</body>
</html>
