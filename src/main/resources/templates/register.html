<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <form action="/register" method="post">

        <input
                type="text"
                name="fullName"
                placeholder="Full Name"
                required>

        <input
                type="text"
                name="username"
                placeholder="Username"
                required>

        <input
                type="email"
                name="email"
                placeholder="Email"
                required>

        <input
                type="password"
                name="password"
                placeholder="Password"
                required>

        <button type="submit">

            Register

        </button>

    </form>

    <p class="message"
       th:text="${message}"></p>

    <a href="/">Already have an account? Login</a>

</div>

</body>

</html>
